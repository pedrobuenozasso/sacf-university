name: Deploy SACF Academy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy Docker Compose project
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: sacf-academy
          docker-compose-path: docker-compose.yml
          environment-variables: |
            NODE_ENV=production
            NEXT_PUBLIC_BASE_PATH=/academy
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DATABASE_CA_CERT_BASE64=${{ secrets.DATABASE_CA_CERT_BASE64 }}
            DATABASE_CA_SERVERNAME=${{ secrets.DATABASE_CA_SERVERNAME }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GCS_MEDIA_BUCKET=${{ secrets.GCS_MEDIA_BUCKET }}
            GCS_SERVICE_ACCOUNT_JSON=${{ secrets.GCS_SERVICE_ACCOUNT_JSON }}
