name: Deploy SACF Academy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sacf-academy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Trigger restricted VPS deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 72.60.242.96
          username: sacf-deploy
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script_stop: true
          # The VPS key is forced to /usr/local/sbin/deploy-sacf-academy.
          # It cannot open a shell or execute arbitrary workflow commands.
          script: |
            true
